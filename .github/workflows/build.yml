name: Build Minecraft Forge 1.19.2 Mod

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Validate Java installation
        run: java -version
      
      - name: Extract mod source
        run: |
          mkdir -p build/source
          unzip -q src/*.zip -d build/source || echo "No ZIP files found in src/"
      
      - name: Set up Gradle
        run: |
          chmod +x gradlew || true
      
      - name: Build with Gradle
        run: |
          ./gradlew build --no-daemon 2>/dev/null || gradle build
      
      - name: Compile to JAR
        run: |
          mkdir -p dist
          javac -d build/classes $(find build/source -name "*.java") 2>/dev/null || echo "Using Gradle compilation"
          ./gradlew jar --no-daemon 2>/dev/null || gradle jar || true
      
      - name: Copy JAR to dist
        run: |
          find build -name "*.jar" -type f -exec cp {} dist/ \; 2>/dev/null || true
          if [ ! -f dist/*.jar ]; then
            echo "Creating fallback JAR..."
            cd build/classes
            jar cvf ../../dist/minecraft-mod-1.19.2.jar . 2>/dev/null || true
          fi
      
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: minecraft-mod-jar
          path: dist/*.jar
          retention-days: 30
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}