name: Simple Compile to JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create build directory
        run: mkdir -p build/output
      
      - name: Find and compile all Java files
        run: |
          find . -name "*.java" -type f > /tmp/files.txt
          if [ -s /tmp/files.txt ]; then
            mkdir -p build/classes
            javac -d build/classes $(cat /tmp/files.txt) 2>&1 || echo "Compilation attempted"
          else
            echo "No Java files found"
          fi
      
      - name: Create JAR from compiled classes
        run: |
          if [ -d "build/classes" ] && [ "$(ls -A build/classes)" ]; then
            cd build/classes
            jar cvf ../output/minecraft-mod.jar .
            cd ../..
          else
            echo "No compiled classes found"
          fi
      
      - name: Extract and compile ZIPs (if any)
        run: |
          if [ -d "src" ] && [ ! -z "$(find src -name '*.zip')" ]; then
            mkdir -p build/extracted
            find src -name "*.zip" -exec unzip -q {} -d build/extracted \;
            find build/extracted -name "*.java" -type f > /tmp/zip_files.txt
            if [ -s /tmp/zip_files.txt ]; then
              mkdir -p build/classes_zip
              javac -d build/classes_zip $(cat /tmp/zip_files.txt) 2>&1 || echo "ZIP compilation attempted"
              cd build/classes_zip
              jar cvf ../output/minecraft-mod-from-zip.jar .
              cd ../..
            fi
          fi
      
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-mod-jar
          path: build/output/*.jar
          if-no-files-found: warn
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/output/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
