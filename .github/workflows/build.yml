name: Build Minecraft Forge 1.19.2 Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Download Forge MDK 1.19.2
        run: |
          mkdir -p forge-mdk
          cd forge-mdk
          wget -q https://maven.minecraftforge.net/net/minecraftforge/forge/1.19.2-43.1.1/forge-1.19.2-43.1.1-mdk.zip
          unzip -q forge-1.19.2-43.1.1-mdk.zip
          cd ..
      
      - name: Extract mod source from ZIP (if exists)
        run: |
          if [ -f "src/Huawei_pack.zip" ]; then
            unzip -q src/Huawei_pack.zip -d forge-mdk/src/main/java/
            echo "Mod source extracted"
          elif [ -f "src/mod-source.zip" ]; then
            unzip -q src/mod-source.zip -d forge-mdk/src/main/java/
            echo "Mod source extracted"
          elif [ -d "src/main/java" ]; then
            cp -r src/main/java/* forge-mdk/src/main/java/ 2>/dev/null || true
            echo "Mod Java files copied"
          fi
      
      - name: Set up Gradle wrapper permissions
        run: |
          cd forge-mdk
          chmod +x gradlew
      
      - name: Build with Gradle
        run: |
          cd forge-mdk
          ./gradlew build --no-daemon
      
      - name: Copy JAR to output
        run: |
          mkdir -p build/output
          find forge-mdk/build/libs -name "*.jar" -exec cp {} build/output/ \;
      
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-mod-jar
          path: build/output/*.jar
          if-no-files-found: warn
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/output/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
